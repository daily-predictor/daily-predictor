<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Predictor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);padding:2rem;text-align:center;border-bottom:1px solid #334155}
.header h1{font-size:2.5rem;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.header p{color:#94a3b8;font-size:1.1rem}
.container{max-width:1200px;margin:0 auto;padding:2rem}
.tabs{display:flex;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap}
.tab{padding:.75rem 1.5rem;background:#1e293b;border:1px solid #334155;border-radius:.5rem;cursor:pointer;transition:all .2s;font-size:.95rem;font-weight:500;color:#94a3b8}
.tab:hover{background:#334155;color:#e2e8f0}
.tab.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.tab .count{display:inline-block;background:rgba(255,255,255,.2);padding:.1rem .4rem;border-radius:1rem;font-size:.75rem;margin-left:.5rem}
.loading{text-align:center;padding:4rem;color:#64748b}
.no-data{text-align:center;padding:4rem;color:#64748b;background:#1e293b;border-radius:.5rem;border:1px dashed #334155}
table{width:100%;border-collapse:collapse;background:#1e293b;border-radius:.5rem;overflow:hidden;border:1px solid #334155}
thead{background:#0f172a}
th{padding:1rem;text-align:left;font-weight:600;color:#94a3b8;font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #334155}
td{padding:1rem;border-bottom:1px solid #334155;font-size:.95rem}
tr:hover{background:#252f47}
.match-name{font-weight:600;color:#f1f5f9}
.prob-bar{display:flex;height:24px;border-radius:4px;overflow:hidden;min-width:120px}
.prob-home{background:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:#fff}
.prob-draw{background:#64748b;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:#fff}
.prob-away{background:#ef4444;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:#fff}
.odds{font-family:'Courier New',monospace;font-weight:600}
.fair-odds{color:#60a5fa}
.market-odds{color:#a78bfa}
.ev-positive{color:#4ade80;font-weight:700}
.ev-negative{color:#f87171}
.ev-neutral{color:#94a3b8}
.last-updated{text-align:center;color:#64748b;margin-top:2rem;font-size:.85rem}
@media(max-width:768px){.container{padding:1rem}.header h1{font-size:1.75rem}table{font-size:.85rem}th,td{padding:.75rem .5rem}.prob-bar{min-width:80px;height:20px}}
</style>
</head>
<body>
<div class="header"><h1>Daily Predictor</h1><p>Mathematical sports predictions updated daily at 05:00 UTC</p></div>
<div class="container">
<div class="tabs" id="tabs">
<button class="tab active" onclick="switchTab('soccer',this)">Soccer <span class="count" id="count-soccer">0</span></button>
<button class="tab" onclick="switchTab('basketball',this)">Basketball <span class="count" id="count-basketball">0</span></button>
<button class="tab" onclick="switchTab('baseball',this)">Baseball <span class="count" id="count-baseball">0</span></button>
<button class="tab" onclick="switchTab('tennis',this)">Tennis <span class="count" id="count-tennis">0</span></button>
<button class="tab" onclick="switchTab('hockey',this)">Hockey <span class="count" id="count-hockey">0</span></button>
<button class="tab" onclick="switchTab('handball',this)">Handball <span class="count" id="count-handball">0</span></button>
</div>
<div id="content"><div class="loading">Loading predictions...</div></div>
<div class="last-updated" id="last-updated"></div>
</div>
<script>
const SPORTS=['soccer','basketball','baseball','tennis','hockey','handball'];
let currentSport='soccer',predictionsData={};
function getTodayStr(){const d=new Date();return d.toISOString().split('T')[0]}
async function loadPredictions(sport){const dateStr=getTodayStr(),url=`/output/${sport}/${dateStr}.json`;try{const r=await fetch(url);if(!r.ok)throw new Error(`HTTP ${r.status}`);const data=await r.json();predictionsData[sport]=data;return data}catch(e){console.error(`Failed ${sport}:`,e);predictionsData[sport]=null;return null}}
function renderProbBar(pHome,pDraw,pAway){const h=Math.round(pHome*100),d=pDraw?Math.round(pDraw*100):0,a=Math.round(pAway*100);let html='<div class="prob-bar">';if(h>0)html+=`<div class="prob-home" style="width:${h}%">${h}%</div>`;if(d>0)html+=`<div class="prob-draw" style="width:${d}%">${d}%</div>`;if(a>0)html+=`<div class="prob-away" style="width:${a}%">${a}%</div>`;return html+'</div>'}
function renderEV(ev){if(ev===null||ev===undefined)return'<span class="ev-neutral">-</span>';if(ev>0)return`<span class="ev-positive">+${(ev*100).toFixed(1)}%</span>`;if(ev<0)return`<span class="ev-negative">${(ev*100).toFixed(1)}%</span>`;return'<span class="ev-neutral">0.0%</span>'}
function renderTable(sport,data){if(!data||!data.predictions||data.predictions.length===0)return`<div class="no-data"><h3>No predictions available</h3><p>Check back after 05:00 UTC or ensure the daily pipeline has run.</p></div>`;const low=['soccer','hockey','handball'].includes(sport),tennis=sport==='tennis';let html='<table><thead><tr><th>Match</th><th>Model Probability</th><th>Fair Odds</th><th>Market Odds</th><th>EV</th>';if(low)html+='<th>O/U 2.5</th>';else if(!tennis)html+='<th>O/U Over</th>';if(tennis)html+='<th>2-0</th><th>Set Hcap</th>';html+='</tr></thead><tbody>';for(const p of data.predictions){html+='<tr>';html+=`<td><span class="match-name">${p.match}</span></td>`;html+=`<td>${renderProbBar(p.p_home,p.p_draw,p.p_away)}</td>`;html+=`<td class="odds fair-odds">${p.fair_odds_home||'-'}</td>`;html+=`<td class="odds market-odds">${p.market_odds_home||'-'}</td>`;html+=`<td>${renderEV(p.ev_home)}</td>`;if(low)html+=`<td>${(p.ou25_over*100).toFixed(0)}%</td>`;else if(!tennis)html+=`<td>${(p.ou_over*100).toFixed(0)}%</td>`;if(tennis){html+=`<td>${(p.p_win_2_0*100).toFixed(0)}%</td>`;html+=`<td>${p.sets_handicap>0?'+':''}${p.sets_handicap}</td>`}html+='</tr>'}html+='</tbody></table>';return html}
async function switchTab(sport,btn){currentSport=sport;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');document.getElementById('content').innerHTML='<div class="loading">Loading...</div>';if(!predictionsData[sport])await loadPredictions(sport);const data=predictionsData[sport];if(data){document.getElementById('content').innerHTML=renderTable(sport,data);document.getElementById('last-updated').textContent=`Last updated: ${new Date(data.generated_at).toLocaleString()}`}else{document.getElementById('content').innerHTML=`<div class="no-data"><h3>No Data Available</h3><p>Could not load predictions for ${sport}.</p></div>`;document.getElementById('last-updated').textContent=''}}
async function init(){for(const s of SPORTS){const data=await loadPredictions(s);const count=data&&data.predictions?data.predictions.length:0;document.getElementById(`count-${s}`).textContent=count}document.querySelector('.tab.active').click()}
init();
</script>
</body>
</html>
